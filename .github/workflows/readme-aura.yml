name: Generate README

on:
  push:
    branches: [main]
    paths:
      - "readme.source.md"
      - ".github/workflows/readme-aura.yml"
  schedule:
    # Runs daily at 6am UTC to keep GitHub stats fresh
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate README
        uses: collectioneur/readme-aura@main
        with:
          source: readme.source.md
          output: README.md
          assets_dir: .github/assets
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_user: nihalsheikh
          auto_commit: "true"
          commit_message: "chore: generate README via readme-aura"
